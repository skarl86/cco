<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0d0d1a"/>

  <!-- Hub lines from center to outer nodes -->
  <line x1="16" y1="15" x2="16" y2="7.5" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="16" y1="15" x2="23.5" y2="20.5" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="16" y1="15" x2="8.5" y2="20.5" stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>

  <!-- Outer agent nodes -->
  <circle cx="16" cy="7" r="2.8" fill="#818cf8"/>
  <circle cx="24" cy="21" r="2.8" fill="#818cf8"/>
  <circle cx="8" cy="21" r="2.8" fill="#818cf8"/>

  <!-- Center orchestrator node (brighter) -->
  <circle cx="16" cy="15" r="3.5" fill="#6366f1"/>
  <circle cx="16" cy="15" r="2" fill="#a5b4fc"/>
</svg>
